model:
  type: gpt2
  n_layers: 12
  n_heads: 12
  d_model: 768
  # d_ff: 3072
  seq_len: 1024
  vocab_size: 50257
  dropout: 0.1
  activation: gelu
  position_embedding: learned
  context_length: 512

tokenizer:
  type: gpt2
  vocab_size: 50257

optimizer:
  type: adam
  lr: 2.5e-4
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.999

scheduler:
  warmup_steps: 2000
  schedule: cosine

# all configs for training loop
training:
  global_batch_size: 512
  micro_batch_size: 8
  epochs: 100
  valid_epoch_interval: 5
  test_epoch_interval: 5
  init_std: 0.02
  dataloader_num_workers: 8

# all configs for dataset and dataloader
data:
  train_bin_file_path: /Users/ashutosh/personal/study/gpt/assets/processed_data/openwebtext_train.bin
  valid_bin_file_path: /Users/ashutosh/personal/study/gpt/assets/processed_data/openwebtext_valid.bin
  test_bin_file_path: /Users/ashutosh/personal/study/gpt/assets/processed_data/openwebtext_test.bin
  prefetch_factor: 2