model:
  n_layers: 12
  n_heads: 12
  d_model: 768
  d_ff: 3072
  seq_len: 512
  vocab_size: 40000
  dropout: 0.1
  activation: gelu
  position_embedding: learned

optimizer:
  type: adam
  lr: 2.5e-4
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.999

scheduler:
  warmup_steps: 2000
  schedule: cosine

training:
  batch_size: 64
  epochs: 100
  init_std: 0.02